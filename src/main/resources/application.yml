server:
  port: ${PORT:8080}

spring:
  application:
    name: ads-dashboard
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${DASHBOARD_OAUTH_CLIENT_ID:}
            client-secret: ${DASHBOARD_OAUTH_CLIENT_SECRET:}
            scope:
              - openid
              - email
              - profile

app:
  allowed-email-domain: ${ALLOWED_EMAIL_DOMAIN:caring.co.kr}

lead:
  # CSV fallback (sheet 미설정 시)
  csv-path: ${LEAD_CSV_PATH:data/leads.csv}
  # Google Sheets (서비스 계정)
  sheet-id: ${LEAD_SHEET_ID:}
  sheet-range: ${LEAD_SHEET_RANGE:A:Z}
  # 둘 중 하나만 채우면 됨. Path가 운영(Render)에선 불편하므로 KEY(JSON 통째로) 권장.
  service-account-key: ${GOOGLE_SERVICE_ACCOUNT_KEY:}
  service-account-key-path: ${GOOGLE_SERVICE_ACCOUNT_KEY_PATH:}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

meta:
  access-token: ${META_ACCESS_TOKEN:}
  ad-account-id: ${META_AD_ACCOUNT_ID:}
  api-version: ${META_API_VERSION:v21.0}

google:
  developer-token: ${GOOGLE_ADS_DEVELOPER_TOKEN:}
  client-id: ${GOOGLE_ADS_CLIENT_ID:}
  client-secret: ${GOOGLE_ADS_CLIENT_SECRET:}
  refresh-token: ${GOOGLE_ADS_REFRESH_TOKEN:}
  customer-id: ${GOOGLE_ADS_CUSTOMER_ID:}
  login-customer-id: ${GOOGLE_ADS_LOGIN_CUSTOMER_ID:}
  api-version: ${GOOGLE_ADS_API_VERSION:v20}

naver:
  base-url: ${NAVER_ADS_BASE_URL:https://api.searchad.naver.com}
  accounts:
    - name: ${NAVER_ADS_0_NAME:}
      api-key: ${NAVER_ADS_0_API_KEY:}
      secret-key: ${NAVER_ADS_0_SECRET_KEY:}
      customer-id: ${NAVER_ADS_0_CUSTOMER_ID:}
    - name: ${NAVER_ADS_1_NAME:}
      api-key: ${NAVER_ADS_1_API_KEY:}
      secret-key: ${NAVER_ADS_1_SECRET_KEY:}
      customer-id: ${NAVER_ADS_1_CUSTOMER_ID:}
    - name: ${NAVER_ADS_2_NAME:}
      api-key: ${NAVER_ADS_2_API_KEY:}
      secret-key: ${NAVER_ADS_2_SECRET_KEY:}
      customer-id: ${NAVER_ADS_2_CUSTOMER_ID:}
    - name: ${NAVER_ADS_3_NAME:}
      api-key: ${NAVER_ADS_3_API_KEY:}
      secret-key: ${NAVER_ADS_3_SECRET_KEY:}
      customer-id: ${NAVER_ADS_3_CUSTOMER_ID:}
    - name: ${NAVER_ADS_4_NAME:}
      api-key: ${NAVER_ADS_4_API_KEY:}
      secret-key: ${NAVER_ADS_4_SECRET_KEY:}
      customer-id: ${NAVER_ADS_4_CUSTOMER_ID:}
    - name: ${NAVER_ADS_5_NAME:}
      api-key: ${NAVER_ADS_5_API_KEY:}
      secret-key: ${NAVER_ADS_5_SECRET_KEY:}
      customer-id: ${NAVER_ADS_5_CUSTOMER_ID:}
    - name: ${NAVER_ADS_6_NAME:}
      api-key: ${NAVER_ADS_6_API_KEY:}
      secret-key: ${NAVER_ADS_6_SECRET_KEY:}
      customer-id: ${NAVER_ADS_6_CUSTOMER_ID:}
