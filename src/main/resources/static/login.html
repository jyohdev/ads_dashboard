<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>로그인 · 케어링 광고 대시보드</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; background:#FAFAFA; }
    .accent { color:#EF6079; }
    .card { background:#fff; border:1px solid #F0E4E7; border-radius:18px; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
  <div class="card p-8 w-full max-w-sm text-center shadow-sm">
    <h1 class="text-xl font-bold text-slate-800">케어링 광고 대시보드</h1>
    <p class="text-sm text-slate-500 mt-1">Marketing Dashboard</p>

    <div id="error" class="hidden mt-5 p-3 text-xs rounded-lg" style="background:#FEE2E2;color:#991B1B">
    </div>

    <a href="/oauth2/authorization/google"
       class="mt-7 inline-flex items-center justify-center gap-2 w-full px-4 py-3 rounded-full font-medium text-white"
       style="background:#EF6079">
      <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
        <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z" fill="#fff"/>
        <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.331A8.997 8.997 0 0 0 9 18z" fill="#fff" fill-opacity=".95"/>
        <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.96H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.04l3.007-2.33z" fill="#fff" fill-opacity=".9"/>
        <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.96L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#fff" fill-opacity=".85"/>
      </svg>
      Google 계정으로 로그인
    </a>

    <p class="text-[11px] text-slate-400 mt-4">@caring.co.kr 계정만 접근 가능합니다</p>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    if (params.has('error')) {
      const el = document.getElementById('error');
      el.textContent = '로그인이 거부되었습니다. @caring.co.kr 계정으로만 접근 가능합니다.';
      el.classList.remove('hidden');
    }
  </script>
</body>
</html>
